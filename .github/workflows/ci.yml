name: ci

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  validate-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Compile backend
        run: python -m py_compile server.py
