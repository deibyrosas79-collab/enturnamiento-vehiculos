services:
  - type: web
    name: enturnamiento-vehiculos
    runtime: python
    plan: starter
    buildCommand: python -m py_compile server.py
    startCommand: python server.py
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.2
      - key: DB_PATH
        value: /var/data/enturnamiento.db
    disk:
      name: enturnamiento-data
      mountPath: /var/data
      sizeGB: 1
