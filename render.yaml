services:
  - type: web
    name: enturnamiento-vehiculos
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python -m py_compile server.py
    startCommand: python server.py
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.2
      - key: DATABASE_URL
        sync: false
